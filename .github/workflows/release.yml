name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "test"

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RELEASE_BIN: sswsort
  RELEASE_CRATE: sswsort-cli
  REGISTRY: ghcr.io

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract Changelog
        id: extract_changelog
        shell: bash
        run: perl .github/scripts/last_release_notes.pl > "$RUNNER_TEMP/release_notes.md"

      - name: Create Release
        id: create_release
        shell: bash
        run: |
          [[ "${{ github.ref_name }}" == "test" ]] && latest="--latest=false" || latest=""

          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "SSWSort ${{ github.ref_name }}" \
            --notes-file "$RUNNER_TEMP/release_notes.md" \
            $latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-image-and-rhel8-artifacts:
    name: Build and Push Release Image
    needs: [create-release]
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to dhi.io
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USER }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.ref_name }}-${{ matrix.arch }}

      - name: Build and push Docker image
        id: buildpush
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: mode=max
          sbom: generator=docker/scout-sbom-indexer:latest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Extract Linux Binary
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: binary-export
          outputs: type=local,dest=./extracted

      - name: Bundle Linux Artifact
        shell: bash
        run: |
          BUNDLE_DIR="${{ env.RELEASE_CRATE }}-${{ github.ref_name }}"
          mkdir -p "$BUNDLE_DIR"
          mv extracted/sswsort LICENSE README.md sswsort_res "$BUNDLE_DIR/"
          tar -czf ${{ env.RELEASE_CRATE }}-linux-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz "$BUNDLE_DIR"

      - name: Upload Linux Release Asset
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" ${{ env.RELEASE_CRATE }}-linux-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-image-manifest:
    name: Create Image Manifest
    needs: build-release-image-and-rhel8-artifacts
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.ref_name }}

      - name: Create and push manifests
        shell: bash
        env:
          DOCKER_METADATA_OUTPUT_ANNOTATIONS: ${{ steps.meta.outputs.annotations }}
        run: |
          REPO=$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[A-Z]' '[a-z]')
          VERSION="${REPO}:${{ github.ref_name }}"
          LATEST="${REPO}:latest"

          annotations=()
          while IFS= read -r annot; do
            [[ -n "$annot" ]] && annotations+=(--annotation "$annot")
          done <<< "$DOCKER_METADATA_OUTPUT_ANNOTATIONS"

          docker buildx imagetools create "${annotations[@]}" --tag "$VERSION" \
            "${VERSION}-x86_64" "${VERSION}-aarch64"

          if [[ "${{ github.ref_name }}" != "test" ]]; then
            docker buildx imagetools create --tag "$LATEST" "$VERSION"
          fi

  build-mac-artifacts:
    name: Build Mac Artifacts
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install latest nightly Rust
        shell: bash
        run: |
          rustup update nightly
          rustup default nightly
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build
        shell: bash
        run: |
          cargo build -p ${{ env.RELEASE_CRATE }} --profile prod --target aarch64-apple-darwin
          cargo build -p ${{ env.RELEASE_CRATE }} --profile prod --target x86_64-apple-darwin

      - name: Package Binary
        shell: bash
        run: |
          BUNDLE_DIR="${{ env.RELEASE_CRATE }}-${{ github.ref_name }}"
          mkdir -p "$BUNDLE_DIR"
          lipo -create -output "$BUNDLE_DIR/${{ env.RELEASE_BIN }}" \
            target/aarch64-apple-darwin/prod/${{ env.RELEASE_BIN }} \
            target/x86_64-apple-darwin/prod/${{ env.RELEASE_BIN }}
          mv LICENSE README.md sswsort_res "$BUNDLE_DIR/"
          tar -czf ${{ env.RELEASE_CRATE }}-apple-universal-${{ github.ref_name }}.tar.gz "$BUNDLE_DIR"

      - name: Upload Release Asset
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" ${{ env.RELEASE_CRATE }}-apple-universal-${{ github.ref_name }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [create-image-manifest, build-mac-artifacts]
    # Skip for test tags: keep the draft release so the tag stays mutable and
    # can be deleted and reused for subsequent test runs.
    if: github.ref_name != 'test'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Publish Release
        shell: bash
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
