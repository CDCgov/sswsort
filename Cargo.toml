[package]
name = "sswsort"
version = "2.0.0"
edition = "2021"
authors = ["Samuel S. Shepard", "Samuel Wiley"]

[dependencies]
clap = { version = "4", features = ["derive"] }
rayon = "*"
zoe = { git = "https://git.biotech.cdc.gov/vfn4/zoe.git", branch = "finish-striped-sw", default-features = false }
toml = "*"
serde = "*"
serde_derive = "*"
foldhash = "0.1"

[profile.release]
strip = true
lto = "thin"
