[package]
name = "sswsort"
version = "2.0.0"
edition = "2024"
authors = ["Samuel S. Shepard", "Samuel Wiley"]
rust-version = "1.88"

[dependencies]
clap = { version = "4", features = ["derive"] }
rayon = "*"
zoe = { git = "https://github.com/CDCgov/zoe.git", branch = "main", default-features = false, features = [
    "multiversion",
] }
toml = "*"
serde = "*"
serde_derive = "*"
foldhash = "*"
num_cpus = "*"

[profile.release]
strip = true
lto = "thin"
