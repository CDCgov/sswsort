[package]
name = "sswsort"
version = "2.0.0"
edition = "2024"
authors = ["Samuel S. Shepard", "Samuel Wiley", "David Hufnagel"]
rust-version = "1.88"

[dependencies]
zoe = { version = "0.0.25", default-features = false, features = [
    "multiversion",
] }
clap = { version = "4", features = ["derive"] }
rayon = "1"
toml = "0.9"
serde = "1"
serde_derive = "1"
foldhash = "0.2"
num_cpus = "1"
jiff = "0.2"
itoa = "1"

[profile.release]
strip = true
lto = "fat"
codegen-units = 1
